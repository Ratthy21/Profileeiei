    <style>
        #sakura-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .sakura { position: absolute; background: #ffc0cb; border-radius: 0 50% 0 50%; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
    <script>
        function createSakura() {
            const container = document.getElementById('sakura-container');
            const s = document.createElement('div');
            s.className = 'sakura';
            const size = Math.random() * 10 + 5;
            s.style.width = size + 'px'; s.style.height = size + 'px';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = Math.random() * 5 + 5 + 's';
            s.style.opacity = Math.random();
            container.appendChild(s);
            setTimeout(() => s.remove(), 10000);
        }
        setInterval(createSakura, 300);

    <script>
        // 1. ระบบนับถอยหลังวันเกิด
        const birthday = new Date("2027-04-12T00:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = birthday - now;
            document.getElementById("days").innerHTML = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerHTML = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerHTML = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerHTML = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);

        // 2. ระบบสลับโหมดเปิด-ปิดไฟแบบสมูท ถนอมสายตา และเปลี่ยนสีทั้งหน้าจอ
const themeToggle = document.getElementById('theme-toggle');
const themeIcon = document.getElementById('theme-icon');
const themeText = document.getElementById('theme-text');

themeToggle.addEventListener('click', () => {
    // สลับคลาส light-theme ที่ body
    document.body.classList.toggle('light-theme');
    const isLight = document.body.classList.contains('light-theme');
    
    if (isLight) {
        themeIcon.innerText = "☀️";
        themeText.innerText = "Light Mode";
        themeToggle.style.background = "rgba(255, 255, 255, 0.9)";
        themeToggle.style.color = "#000";
        themeToggle.style.borderColor = "#ccc";
    } else {
        themeIcon.innerText = "🌙";
        themeText.innerText = "Dark Mode";
        themeToggle.style.background = "rgba(0, 0, 0, 0.6)";
        themeToggle.style.color = "#fff";
        themeToggle.style.borderColor = "rgba(147, 51, 234, 0.4)";
    }
});

// เอฟเฟคปุ่มขยับเล็กน้อยตอนเมาส์ชี้
themeToggle.addEventListener('mouseenter', () => {
    themeToggle.style.transform = "scale(1.05)";
});
themeToggle.addEventListener('mouseleave', () => {
    themeToggle.style.transform = "scale(1)";
});
    </script>
